<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartPay - Dompet Digital untuk mengelola keuangan Anda dengan mudah dan cerdas.">
    <title>SmartPay - Dompet Digital</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Custom CSS -->
    <link href="css/style.css?v=2" rel="stylesheet">
</head>
<body>

    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h4 class="sidebar-brand">SmartPay</h4>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="bi bi-chevron-left"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" href="#" data-page="beranda" id="nav-beranda">
                        <i class="bi bi-house-door-fill"></i>
                        <span>Beranda</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="catat-transaksi" id="nav-catat-transaksi">
                        <i class="bi bi-journal-plus"></i>
                        <span>Catat Transaksi</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="anggaran" id="nav-anggaran">
                        <i class="bi bi-wallet2"></i>
                        <span>Anggaran</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="laporan" id="nav-laporan">
                        <i class="bi bi-file-earmark-bar-graph"></i>
                        <span>Laporan</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="statistik" id="nav-statistik">
                        <i class="bi bi-pie-chart-fill"></i>
                        <span>Statistik</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="riwayat" id="nav-riwayat">
                        <i class="bi bi-clock-history"></i>
                        <span>Riwayat</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="tips" id="nav-tips">
                        <i class="bi bi-lightbulb-fill"></i>
                        <span>Tips Keuangan</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="profil" id="nav-profil">
                        <i class="bi bi-person-fill"></i>
                        <span>Profil</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a class="nav-link" href="#" id="btn-keluar">
                <i class="bi bi-box-arrow-left"></i>
                <span>Keluar</span>
            </a>
        </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="main-content" id="mainContent">
        <!-- Top Navbar -->
        <nav class="top-navbar">
            <button class="btn btn-link d-lg-none sidebar-mobile-toggle" id="mobileSidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>
            <div class="ms-auto d-flex align-items-center gap-2">
                <div id="authButtons">
                    <button class="btn btn-outline-dark btn-sm rounded-pill px-3" id="btn-masuk">Masuk</button>
                    <button class="btn btn-primary btn-sm rounded-pill px-3" id="btn-daftar">Daftar</button>
                </div>
                <div id="userInfo" class="d-none align-items-center gap-2">
                    <span class="user-greeting" id="userGreeting">Halo, User</span>
                    <div class="user-avatar" id="userAvatar">
                        <i class="bi bi-person-fill"></i>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Page Container (pages loaded dynamically via fetch) -->
        <div class="page-container" id="page-container"></div>
    </main>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ============ AUTH PAGE CONTAINERS (content loaded from pages/login.html & pages/register.html) ============ -->
    <div class="auth-page" id="loginPage"></div>
    <div class="auth-page" id="registerPage"></div>

    <!-- ============ TOAST NOTIFICATION ============ -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
        <div id="liveToast" class="toast border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header border-0">
                <i class="bi bi-check-circle-fill text-success me-2" id="toastIcon"></i>
                <strong class="me-auto" id="toastTitle">Berhasil</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                Operasi berhasil dilakukan.
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="js/app.js?v=2"></script>
</body>
</html>
