<!-- ===== AUTH: LOGIN ===== -->
<div class="auth-card">
    <div class="auth-brand">
        <h3 class="auth-brand-title">SmartPay</h3>
        <p class="auth-brand-sub">Dompet Digital Pintar</p>
    </div>
    <h4 class="auth-heading">Masuk</h4>
    <p class="auth-subheading">Selamat datang kembali! Silakan masuk ke akun Anda.</p>
    <form id="formLogin">
        <div class="mb-3">
            <label for="loginEmail" class="form-label auth-label">Email</label>
            <input type="email" class="form-control auth-input" id="loginEmail" required>
        </div>
        <div class="mb-3">
            <label for="loginPassword" class="form-label auth-label">Password</label>
            <input type="password" class="form-control auth-input" id="loginPassword" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label auth-check-label" for="rememberMe">Ingat saya</label>
            </div>
            <a href="#" class="auth-forgot-link">Lupa Password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100 auth-btn" id="btnLogin">Masuk</button>
    </form>
    <p class="auth-switch-text">Belum punya akun? <a href="#" class="auth-switch-link" id="switchToRegister">Daftar sekarang</a></p>
</div>
