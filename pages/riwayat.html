<!-- ===== PAGE: RIWAYAT ===== -->
<section class="page-content active" id="page-riwayat">
    <h2 class="page-title">Riwayat Transaksi</h2>

    <!-- Search & Filter Bar -->
    <div class="card form-card mb-4">
        <div class="card-body p-3">
            <div class="d-flex flex-wrap gap-2 align-items-center">
                <div class="flex-grow-1">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="searchRiwayat" placeholder="Cari Transaksi..">
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-filter active" data-filter="semua" id="filterSemua">Semua</button>
                    <button class="btn btn-filter-pemasukan" data-filter="pemasukan" id="filterPemasukan">Pemasukkan</button>
                    <button class="btn btn-filter-pengeluaran" data-filter="pengeluaran" id="filterPengeluaran">Pengeluaran</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Transaction List (single card container) -->
    <div class="card form-card">
        <div class="card-body p-0" id="listRiwayat">
            <div class="text-center text-muted py-5">
                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                Belum ada riwayat transaksi
            </div>
        </div>
    </div>
</section>
