<!-- ===== PAGE: STATISTIK ===== -->
<section class="page-content active" id="page-statistik">
    <h2 class="page-title">Statistik Keuangan</h2>

    <!-- Charts Row -->
    <div class="row g-3 mb-4">
        <div class="col-lg-6">
            <div class="card form-card">
                <div class="card-body p-3">
                    <h6 class="card-title mb-2 fw-bold">Pengeluaran per kategori</h6>
                    <div style="max-height: 250px;">
                        <canvas id="chartDoughnut" height="240"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card form-card">
                <div class="card-body p-3">
                    <h6 class="card-title mb-2 fw-bold">Perbandingan Bulanan</h6>
                    <div style="max-height: 250px;">
                        <canvas id="chartBar" height="240"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Stat Cards -->
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card form-card stat-card">
                <div class="card-body p-3">
                    <p class="stat-label">Rata-rata Pengeluaran/Hari</p>
                    <h3 class="stat-value" id="statAvgDaily">Rp 0</h3>
                    <p class="stat-change" id="statAvgChange"></p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card form-card stat-card">
                <div class="card-body p-3">
                    <p class="stat-label">Kategori Terbesar</p>
                    <h3 class="stat-value" id="statTopCategory">Rp 10000</h3>
                    <p class="stat-change text-muted" id="statTopPercent"></p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card form-card stat-card">
                <div class="card-body p-3">
                    <p class="stat-label">Total Transaksi</p>
                    <h3 class="stat-value" id="statTotalTx">0</h3>
                    <p class="stat-change text-primary">Bulan ini</p>
                </div>
            </div>
        </div>
    </div>
</section>
